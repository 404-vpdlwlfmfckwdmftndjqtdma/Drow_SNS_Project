apiVersion: apps/v1
kind: Deployment
metadata:
  name: 4nf-backend
  namespace: lion-4nf
  labels:
    app: 4nf-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: 4nf-backend
  template:
    metadata:
      labels:
        app: 4nf-backend
    spec:
      containers:
        - name: 4nf-backend
          image: ghcr.io/404-vpdlwlfmfckwdmftndjqtdma/4nf-backend:1e91cce6fad1f8598412318c3552193b6884e819
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # --- 타임존: JVM(LocalDateTime.now)이 서울 시간으로 저장하도록 고정 ---
            # 로컬 개발 백엔드(Windows, KST)와 저장 시간 기준을 통일한다.
            - name: TZ
              value: "Asia/Seoul"
            # --- DB 접속 (같은 네임스페이스의 postgres 서비스) ---
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "lion4nf"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            # --- JPA 자동 DDL 비활성화 ---
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "none"
          # JWT_SECRET / CLOUDINARY_* 는 별도 Secret(4nf-secret)에서 주입 (값은 git에 없음)
            - name: FRONTEND_URL
              value: "https://4nf.coder-han.com"
          envFrom:
            - secretRef:
                name: 4nf-secret
      # 로컬 볼륨/노드 고정 요건 때문에 vm200 에 배치 고정
      nodeSelector:
        kubernetes.io/hostname: asus-vm200
---
apiVersion: v1
kind: Service
metadata:
  name: nf-backend   # Service 이름은 숫자로 시작 불가(DNS-1035) → 4 제외
  namespace: lion-4nf
  labels:
    app: 4nf-backend
spec:
  selector:
    app: 4nf-backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: 4nf-backend
  namespace: lion-4nf
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: viinac.iptime.org
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 4nf-api.coder-han.com
      secretName: 4nf-backend-tls
  rules:
    - host: 4nf-api.coder-han.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nf-backend
                port:
                  number: 8080
