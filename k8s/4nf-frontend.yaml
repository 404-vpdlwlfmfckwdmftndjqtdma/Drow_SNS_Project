apiVersion: apps/v1
kind: Deployment
metadata:
  name: 4nf-frontend
  namespace: lion-4nf
  labels:
    app: 4nf-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: 4nf-frontend
  template:
    metadata:
      labels:
        app: 4nf-frontend
    spec:
      containers:
        - name: 4nf-frontend
          image: ghcr.io/404-vpdlwlfmfckwdmftndjqtdma/4nf-frontend:9532efb4b8629aeda2cbedab78bbb7accfb42e11
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          # NEXT_PUBLIC_API_URL 은 빌드 시점에 이미지에 박히므로 런타임 env 불필요
      # 로컬 볼륨/노드 고정 요건 때문에 vm200 에 배치 고정
      nodeSelector:
        kubernetes.io/hostname: asus-vm200
---
apiVersion: v1
kind: Service
metadata:
  name: nf-frontend   # Service 이름은 숫자로 시작 불가(DNS-1035) → 4 제외
  namespace: lion-4nf
  labels:
    app: 4nf-frontend
spec:
  selector:
    app: 4nf-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: 4nf-frontend
  namespace: lion-4nf
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: viinac.iptime.org
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 4nf.coder-han.com
      secretName: 4nf-frontend-tls
  rules:
    - host: 4nf.coder-han.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nf-frontend
                port:
                  number: 3000
