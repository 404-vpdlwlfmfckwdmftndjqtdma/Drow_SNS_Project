apiVersion: apps/v1
kind: Deployment
metadata:
  name: 4nf-frontend
  namespace: lion-4nf
  labels:
    app: 4nf-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: 4nf-frontend
  template:
    metadata:
      labels:
        app: 4nf-frontend
    spec:
      containers:
        - name: 4nf-frontend
          image: ghcr.io/404-vpdlwlfmfckwdmftndjqtdma/4nf-frontend:83d7142ea61d9936117658a82befedc909598be0
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          # NEXT_PUBLIC_API_URL 은 빌드 시점에 이미지에 박히므로 런타임 env 불필요
---
apiVersion: v1
kind: Service
metadata:
  name: 4nf-frontend
  namespace: lion-4nf
  labels:
    app: 4nf-frontend
spec:
  selector:
    app: 4nf-frontend
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: 4nf-frontend
  namespace: lion-4nf
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "true"
    external-dns.alpha.kubernetes.io/target: viinac.iptime.org
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - 4nf.coder-han.com
      secretName: 4nf-frontend-tls
  rules:
    - host: 4nf.coder-han.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: 4nf-frontend
                port:
                  number: 3000
