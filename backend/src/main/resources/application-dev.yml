spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:canvasflow}
    username: ${DB_USERNAME:canvasflow}
    password: ${DB_PASSWORD:canvasflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

logging:
  level:
    com.canvasflow: DEBUG
    org.hibernate.SQL: DEBUG

# dev 모드: JWT 필터 완성 전까지 대부분의 API를 인증 없이 호출 가능하도록 SecurityConfig 에서 permitAll 처리
